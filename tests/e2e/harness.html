<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.21.0/dist/css/uikit.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/uikit@3.21.0/dist/js/uikit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/uikit@3.21.0/dist/js/uikit-icons.min.js"></script>
  <link rel="stylesheet" href="/src/styles.css">
  <script type="importmap">
  {
    "imports": {
      "/src/store.js": "/tests/e2e/fake-store.js"
    }
  }
  </script>
</head>
<body>
  <div id="view-table">
    <div id="table-root"></div>
  </div>

  <!-- Required by debug.js (module-level getElementById) -->
  <div id="debug-overlay" hidden><div id="debug-content"></div></div>

  <!-- Modal stubs — referenced by dealer action handlers -->
  <div id="modal-new-game"></div>
  <div id="modal-buy-chips"></div>

  <!-- End Game Modal — full structure required by _showEndGameDialog -->
  <div id="modal-end-game" uk-modal>
    <div class="uk-modal-dialog uk-modal-body">
      <h3 class="uk-modal-title">End Game</h3>
      <p id="eg-pot-label"></p>
      <div id="eg-form"></div>
      <div class="uk-modal-footer uk-flex uk-flex-middle uk-flex-between">
        <small id="eg-preview" class="uk-text-muted" style="max-width:60%"></small>
        <div>
          <button class="uk-button uk-button-default uk-modal-close">Cancel</button>
          <button id="eg-submit" class="uk-button uk-button-primary uk-margin-small-left">Pay Out</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/tests/e2e/harness-init.js"></script>
</body>
</html>
